apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: biblioteca-backend-hpa
  namespace: biblioteca
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: biblioteca-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
