apiVersion: apps/v1
kind: Deployment
metadata:
  name: biblioteca-backend
  namespace: biblioteca
spec:
  replicas: 2
  selector:
    matchLabels:
      app: biblioteca-backend
  template:
    metadata:
      labels:
        app: biblioteca-backend
    spec:
      containers:
        - name: biblioteca-backend
          # Placeholder: el pipeline CI/CD sobreescribe esta imagen en cada
          # deploy con `kubectl set image` apuntando al tag del commit (sha).
          image: ckrlos/biblioteca-backend:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DB_HOST
              value: mysql-service
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_DATABASE
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
