# PersistentVolumeClaim para los datos de MySQL. Usa la StorageClass por
# defecto del cluster EKS (gp2/gp3 via el addon EBS CSI de AWS Academy), asi
# que no requiere ninguna intervencion manual adicional al aplicar k8s/.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: biblioteca
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
