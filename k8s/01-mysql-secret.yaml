# Valores de ejemplo en texto plano (mysql-secret.yaml normalmente NO se
# commitea con datos reales). Antes de aplicar en el clúster real, reemplaza
# los valores de "stringData" con las credenciales definitivas, o genera este
# Secret con `kubectl create secret generic ... --from-literal=...` en vez de
# aplicar este archivo tal cual.
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: biblioteca
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: changeme_root
  MYSQL_DATABASE: biblioteca
  MYSQL_USER: biblioteca_user
  MYSQL_PASSWORD: changeme
